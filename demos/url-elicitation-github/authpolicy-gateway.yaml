apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: mcp-oidc-policy
  namespace: gateway-system
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: mcp-gateway
    sectionName: mcp
  when:
    - predicate: "!request.path.startsWith('/.well-known/')"
  rules:
    authentication:
      oidc:
        jwt:
          issuerUrl: {{ ISSUER_URL }}
    response:
      unauthenticated:
        headers:
          'WWW-Authenticate':
            expression: >-
              "Bearer resource_metadata={{ EXTERNAL_URL }}/.well-known/oauth-protected-resource/mcp"
        body:
          value: |
            {"error":"Unauthorized","message":"Authentication required"}
